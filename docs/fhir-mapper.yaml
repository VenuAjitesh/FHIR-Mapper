            $ref: '#/components/schemas/Practitioner'
        organisation:
          $ref: '#/components/schemas/Organisation'
        invoice:
          $ref: '#/components/schemas/Invoice'
        chargeItems:
          type: array
          description: List of charge items included in this invoice
          items:
            $ref: '#/components/schemas/ChargeItem'
        payment:
          $ref: '#/components/schemas/Payment'

    Invoice:
      type: object
      description: Detailed invoice metadata including totals and terms
      required:
        - status
        - type
        - totalNet
        - totalGross
        - currency
        - date
      properties:
        id:
          type: string
          description: Unique identifier for the invoice
          example: INV-12345
        status:
          type: string
          description: Current status of the invoice
          enum: [draft, issued, balanced, cancelled, entered-in-error]
          example: issued
        type:
          type: string
          description: Category or type of the invoice
          example: Pharmacy
        date:
          type: string
          format: date-time
          description: Date of invoice issuance
          example: 2025-08-12T10:30:00+05:30
        totalNet:
          type: number
          format: double
          description: Total net amount (after discounts/taxes)
          example: 2000.0
        totalGross:
          type: number
          format: double
          description: Total gross amount (before discounts/taxes)
          example: 2200.0
        currency:
          type: string
          description: Currency code (e.g., INR)
          example: INR
        paymentTerms:
          type: string
          description: Terms and conditions for payment
          example: Due in 15 days
        note:
          type: string
          description: Additional notes or remarks for the invoice
          example: Surgery + post-op medicines

    ChargeItem:
      type: object
      description: Represents a single billable item or service
      required:
        - productType
        - chargeType
        - status
        - quantity
        - price
        - description
      properties:
        id:
          type: string
          description: Unique identifier for the charge item
          example: CHG-002
        productType:
          type: string
          description: Type of product (medication, device, or substance)
          enum: [medication, device, substance]
          example: medication
        chargeCode:
          type: string
          description: Internal code for the charge
          example: CONSULT
        chargeType:
          type: string
          description: Category of the charge (e.g., Pharmacy, OPD, IPD)
          example: Pharmacy
        status:
          type: string
          description: Billing status of the charge item
          enum: [planned, billable, not-billable, aborted, billed, entered-in-error, unknown]
          example: billed
        description:
          type: string
          description: Descriptive name of the service or product
          example: Amoxicillin 500mg
        quantity:
          type: number
          format: double
          description: Quantity of the item or service provided
          example: 14.0
        price:
          type: array
          description: Breakdown of price components (base, tax, discount, etc.)
          items:
            $ref: '#/components/schemas/Price'
        medication:
          $ref: '#/components/schemas/InvoiceMedication'
        device:
          $ref: '#/components/schemas/Device'
        substance:
          $ref: '#/components/schemas/Substance'

    Price:
      type: object
      required:
        - proceType
        - amount
      properties:
        priceType:
          type: string
          enum: [base, surcharge, deduction, discount, SGST, CGST, informational]
        amount:
          type: number
          format: double

    InvoiceMedication:
      type: object
      required:
        - medicineName
      properties:
        medicineName:
          type: string
        manufacturer:
          type: string
        medicationForm:
          type: string
        lotNumber:
          type: string
        expiryDate:
          type: string
          format: date-time

    Device:
      type: object
      required:
        - status
        - deviceName
      properties:
        udiCarrier:
          type: string
        manufacturer:
          type: string
        modelNumber:
          type: string
        lotNumber:
          type: string
        serialNumber:
          type: string
        manufactureDate:
          type: string
          format: date
        expirationDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, entered-in-error, unknown]
        safety:
          type: array
          items:
            type: string
        deviceName:
          type: string
        note:
          type: string

    Substance:
      type: object
      required:
        - code
        - category
        - description
        - quantity
      properties:
        id:
          type: string
        code:
          type: string
        category:
          type: string
        description:
          type: string
        expiry:
          type: string
          format: date-time
        quantity:
          type: number
          format: double

    Payment:
      type: object
      required:
        - method
        - status
        - paymentAmount
      properties:
        method:
          type: string
          example: upi
        status:
          type: string
          enum: [active, cancelled, draft, entered-in-error, null]
        paymentDate:
          type: string
          format: date-time
        paidAmount:
          type: number
          format: double
        transactionId:
          type: string



    ValidationErrorResponse:
      type: object
      properties:
        validationErrors:
          type: object
          properties:
            code:
              type: integer
              example: 1000
            error:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
      example:
        validationErrors:
          code: 1000
          error:
            - field: bundleType
              message: must match "PrescriptionRecord"

    GenericErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
      example:
        error:
          code: 1000
          message: "Parsing error must match the date format 2002-05-12"

    ValidationResult:
      type: object
      description: Result of FHIR bundle validation
      properties:
        valid:
          type: boolean
          description: Whether the bundle passed validation
        issues:
          type: array
          description: List of validation issues found
          items:
            $ref: '#/components/schemas/ValidationIssue'
        errorCount:
          type: integer
          description: Number of error-level issues
        warningCount:
          type: integer
          description: Number of warning-level issues
        informationCount:
          type: integer
          description: Number of information-level issues
      example:
        valid: false
        issues:
          - severity: ERROR
            code: "REQUIRED_FIELD_MISSING"
            details: "Patient.identifier is required"
            location: "Bundle.entry[0].resource"
          - severity: WARNING
            code: "PROFILE_VIOLATION"
            details: "Observation.code should use SNOMED CT"
            location: "Bundle.entry[1].resource"
        errorCount: 1
        warningCount: 1
        informationCount: 0

    ValidationIssue:
      type: object
      description: Individual validation issue
      properties:
        severity:
          type: string
          description: Severity level (ERROR, WARNING, INFORMATION)
          enum: [ERROR, WARNING, INFORMATION]
        code:
          type: string
          description: Validation rule code
        details:
          type: string
          description: Detailed description of the issue
        location:
          type: string
          description: Location in the bundle where issue was found
        expression:
          type: string
          description: FHIRPath expression for the issue location
      example:
        severity: ERROR
        code: "REQUIRED_FIELD_MISSING"
        details: "Patient.identifier is required"
        location: "Bundle.entry[0].resource"
        expression: "Patient.identifier"
    Condition:
      type: object
      description: |
        Enhanced NDHM FHIR-compliant Condition Resource with comprehensive clinical details.
        Supports all condition types including chief complaints, medical histories, and clinical diagnoses.
        
        **Key Features:**
        - Clinical status tracking (active, resolved, remission, etc.)
        - Verification status (confirmed, provisional, refuted, etc.)
        - Severity classification (mild, moderate, severe)
        - Condition staging and body site specification
        - Clinical notes and temporal tracking
        
        **FHIR Profile:** https://nrces.in/ndhm/fhir/r4/StructureDefinition-Condition.html
      properties:
        condition:
          type: string
          description: Condition code or description (e.g., Hypertension, Diabetes)
          example: Type 2 Diabetes Mellitus
        recordedDate:
          type: string
          format: date-time
          description: Date when the condition was recorded/documented
          example: "2024-03-21T10:30:00.000Z"
        clinicalStatus:
          type: string
          description: Clinical status of the condition
          enum:
            - active
            - recurrence
            - remission
            - resolved
            - inactive
          example: active
        verificationStatus:
          type: string
          description: Verification status of the condition
          enum:
            - unconfirmed
            - provisional
            - differential
            - confirmed
            - refuted
            - entered-in-error
          example: confirmed
        category:
          type: string
          description: Category of the condition
          enum:
            - problem-list-item
            - encounter-diagnosis
            - health-concern
          example: encounter-diagnosis
        severity:
          type: string
          description: Clinical severity of the condition
          enum:
            - mild
            - moderate
            - severe
          example: moderate
        dateRange:
          $ref: '#/components/schemas/DateRange'
          description: Period when condition was active (onset to abatement)
        abatementDate:
          type: string
          format: date-time
          description: Date when the condition resolved or stopped
          example: "2024-06-20T14:00:00.000Z"
        note:
          type: string
          description: Clinical notes or additional observations about the condition
          example: "Patient shows improvement with current treatment regimen"
        stage:
          type: string
          description: Stage or grade of the condition (e.g., cancer staging, CKD stages)
          example: "Stage 2 (FIGO staging)"
        bodySite:
          type: string
          description: Anatomical location affected by the condition
          example: "Cardiovascular system"
      required:
        - condition
        - recordedDate
      example:
        condition: Type 2 Diabetes Mellitus
        recordedDate: "2024-03-21T10:30:00.000Z"
        clinicalStatus: active
        verificationStatus: confirmed
        category: problem-list-item
        severity: moderate
        stage: "Stage 2"
        note: "Well controlled with metformin and insulin"
        bodySite: "Endocrine system"
        dateRange:
          from: "2018-06-10T00:00:00.000Z"
          to: null