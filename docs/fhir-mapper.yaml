  /wellness-record:
    post:
      tags:
        - HI Types
      summary: Create a Wellness Record
      description: |
        Create a wellness record with vital signs, body measurements, and other observations.
        
        **New Features:**
        - Observations now support **components** for multi-part measurements (e.g., Blood Pressure)
        - **Reference ranges** can be specified for all observation values
        - Age-based reference ranges for age-specific normal values
        
        **Example:** Multi-component observations for Blood Pressure (Systolic/Diastolic) and Eye Vision (Left/Right eye).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessRecord'
      responses:
        '201':
          description: Successfully created
        '400':
