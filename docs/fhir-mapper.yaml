openapi: 3.0.3
info:
  title: FHIR Mapper API's
  description: |
    Conversion of simple json to ABDM compliant FHIR Format bundles
    
    ## Supported Features
    - All FHIR R4 observation types
    - SNOMED code integration
    - Multiple performers per observation
    - Narrative generation
    - Full bundle support
    
    ## Documentation
    - [Quick Reference Guide](https://github.com/ABDM/fhir-mapper/blob/main/QUICK_REFERENCE.md)
    - [Observation Examples](https://github.com/ABDM/fhir-mapper/blob/main/OBSERVATION_EXAMPLES.md)
    - [Best Practices](https://github.com/ABDM/fhir-mapper/blob/main/BEST_PRACTICES.md)
    - [NDHM FHIR Spec](https://nrces.in/ndhm/fhir/r4/StructureDefinition-Observation.html)
  version: 1.0.0
  contact:
    name: ABDM Team
    url: https://www.abdm.gov.in
servers:
  - url: http://localhost:8085/v1/bundle

