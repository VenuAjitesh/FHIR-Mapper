    Observation:
      type: object
      properties:
        observation:
          type: string
          description: The name/code of the observation (e.g., "Blood Pressure", "Hemoglobin")
        result:
          type: string
          description: Coded result of the observation
        status:
          type: string
          description: Status of the observation (e.g., final, preliminary)
        interpretation:
          type: string
          description: Clinical interpretation of the observation
        bodySite:
          type: string
          description: Anatomical location where the observation was made
        valueQuantity:
          $ref: '#/components/schemas/ValueQuantity'
          description: Quantitative value of the observation
        referenceRange:
          $ref: '#/components/schemas/ObservationReferenceRange'
          description: Reference range for normal/abnormal values
        components:
          type: array
          description: Components of the observation (e.g., systolic and diastolic for blood pressure)
          items:
            $ref: '#/components/schemas/ObservationComponent'
      required:
        - observation
      example:
        observation: Blood Pressure
        valueQuantity:
          unit: mmHg
          value: 120
        referenceRange:
          low:
            value: "90"
            unit: mmHg
            system: "http://unitsofmeasure.org"
            code: "mm[Hg]"
          high:
            value: "120"
            unit: mmHg
            system: "http://unitsofmeasure.org"
            code: "mm[Hg]"
        components:
          - observation: Systolic blood pressure
            valueQuantity:
              value: 140
              unit: mmHg
            referenceRange:
              low:
                value: "90"
                unit: mmHg
              high:
                value: "120"
                unit: mmHg
          - observation: Diastolic blood pressure
            valueQuantity:
              value: 90
              unit: mmHg
            referenceRange:
              low:
                value: "60"
                unit: mmHg
              high:
                value: "80"
                unit: mmHg

    ObservationComponent:
      type: object
      description: Component of a multi-component observation (e.g., systolic/diastolic for BP)
      properties:
        observation:
          type: string
          description: The name/code of the component observation
        result:
          type: string
          description: Coded result of the component
        valueQuantity:
          $ref: '#/components/schemas/ValueQuantity'
          description: Quantitative value of the component
        referenceRange:
          $ref: '#/components/schemas/ObservationReferenceRange'
          description: Reference range for the component
      required:
        - observation
      example:
        observation: Systolic blood pressure
        valueQuantity:
          value: 140
          unit: mmHg
        referenceRange:
          low:
            value: "90"
            unit: mmHg
          high:
            value: "120"
            unit: mmHg

    ObservationReferenceRange:
      type: object
      description: Reference range providing guidance on normal/abnormal values
      properties:
        low:
          $ref: '#/components/schemas/ReferenceRangeValue'
          description: Low boundary of the reference range
        high:
          $ref: '#/components/schemas/ReferenceRangeValue'
          description: High boundary of the reference range
        age:
          $ref: '#/components/schemas/AgeRange'
          description: Age range for age-specific reference ranges
        type:
          type: string
          description: Type of reference range (normal, recommended, critical, etc.)
      example:
        low:
          value: "100"
          unit: mg/dL
          system: "http://unitsofmeasure.org"
          code: "mg/dL"
        high:
          value: "200"
          unit: mg/dL
          system: "http://unitsofmeasure.org"
          code: "mg/dL"

    ReferenceRangeValue:
      type: object
      description: A boundary value in a reference range
      properties:
        value:
          type: string
          description: Numeric value as string for precision
        unit:
          type: string
          description: Unit of measurement (e.g., mmHg, mg/dL, g/dL)
        system:
          type: string
          description: Coding system URL (e.g., http://unitsofmeasure.org)
        code:
          type: string
          description: Unit code from the coding system (e.g., mm[Hg])
      required:
        - value
      example:
        value: "120"
        unit: mmHg
        system: "http://unitsofmeasure.org"
        code: "mm[Hg]"

    AgeRange:
      type: object
      description: Age range for age-specific reference ranges
      properties:
        low:
          type: string
          description: Low age value
        high:
          type: string
          description: High age value
      example:
        low: "18"
        high: "65"

