  /diagnostic-report:
    post:
      tags:
        - HI Types
      summary: Create a Diagnostic Report
      description: |
        Create a diagnostic report with observations (e.g., laboratory results, imaging reports).
        
        **Observation Features:**
        - **Components**: Multi-component observations for complex measurements
        - **Reference Ranges**: Specification of normal/abnormal value ranges
        - **Age-based Ranges**: Different reference ranges based on patient age
        - **SNOMED Integration**: Automatic SNOMED code lookup
        
        **Example Use Cases:**
        - Complete Blood Count (CBC) with multiple component values
        - Lipid Panel with HDL, LDL, Total Cholesterol
        - Blood Pressure with Systolic and Diastolic components
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticReport'
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                type: object
                description: Generated FHIR Bundle
              example:
                resourceType: Bundle
                id: d2c3b4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
