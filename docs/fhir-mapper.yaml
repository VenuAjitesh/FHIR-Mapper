  /validate:
    post:
      tags:
        - FHIR Validation
      summary: Validate FHIR Bundle
      description: |
        Validates a FHIR bundle against structural requirements and NDHM profiles.
        
        **Configuration:**
        - `fhir.validation.enabled`: Enable/disable validation (default: false)
        - `fhir.validation.fail-on-error`: Fail request on validation errors (default: false)
        - `fhir.validation.log-details`: Log detailed validation messages (default: false)
        
        **Response:**
        - Returns validation result with issues, error counts, and validity status
        - Always returns 200 (validation result indicates pass/fail)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bundle'
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
